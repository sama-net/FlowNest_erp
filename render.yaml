services:
  - type: web
    name: flownest-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python myenv/myenv/yasso/manage.py migrate && gunicorn --chdir myenv/myenv/yasso --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --log-level info yasso.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flownest-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

databases:
  - name: flownest-db
    plan: free
