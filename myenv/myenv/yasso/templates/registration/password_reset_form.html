{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white mb-2">
                <i class="fas fa-key text-indigo-400 mr-2"></i> استعادة الحساب
            </h2>
            <p class="text-gray-400 text-sm">أدخل بريدك الإلكتروني وسنرسل لك رابط تعيين كلمة المرور</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="flex items-center gap-3 bg-red-500/10 border border-red-500/40 rounded-2xl px-4 py-3 text-red-300">
                <i class="fas fa-exclamation-triangle text-red-400 flex-shrink-0"></i>
                <span class="text-sm">يرجى التأكد من صحة البيانات.</span>
            </div>
            {% endif %}
            
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-300">البريد الإلكتروني</label>
                <div class="relative">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-500"></i>
                    </div>
                    <input type="email" name="email" class="w-full bg-black/30 border border-white/10 rounded-xl py-3 px-10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="email@example.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/30 transition-all hover:scale-[1.02]">
                إرسال الرابط <i class="fas fa-paper-plane mr-2 text-xs"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-sm">
            <a href="{% url 'login' %}" class="font-bold text-gray-400 hover:text-white transition-colors"><i class="fas fa-arrow-right mr-1 text-xs"></i> العودة لتسجيل الدخول</a>
        </div>
    </div>
</div>
{% endblock %}
