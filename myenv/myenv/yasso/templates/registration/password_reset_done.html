{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8 text-center text-white">
        
        <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/20 shadow-lg shadow-emerald-500/10">
            <i class="fas fa-envelope-open-text text-2xl text-emerald-400"></i>
        </div>
        
        <h2 class="text-2xl font-extrabold mb-4">تم إرسال البريد بنجاح</h2>
        <p class="text-gray-400 leading-relaxed mb-8">
            لقد أرسلنا لك تعليمات لإعادة تعيين كلمة المرور الخاصة بك عبر البريد الإلكتروني. إذا كان الحساب موجوداً، ستتلقى رسالة في غضون دقائق.
        </p>
        
        <a href="{% url 'login' %}" class="inline-block bg-white/5 hover:bg-white/10 text-gray-300 hover:text-white border border-white/10 px-8 py-3 rounded-xl transition-all">
            العودة لتسجيل الدخول
        </a>
    </div>
</div>
{% endblock %}
