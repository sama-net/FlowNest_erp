{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8 text-center text-white">
        
        <div class="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/20 shadow-lg shadow-emerald-500/10">
            <i class="fas fa-check-double text-2xl text-emerald-400"></i>
        </div>
        
        <h2 class="text-2xl font-extrabold mb-4">تم تغيير كلمة المرور</h2>
        <p class="text-gray-400 leading-relaxed mb-8">
            تم تحديث كلمة المرور الخاصة بك بنجاح! يمكنك الآن استخدام كلمة المرور الجديدة لتسجيل الدخول إلى حسابك.
        </p>
        
        <a href="{% url 'login' %}" class="inline-block bg-gradient-to-r from-primary to-secondary hover:from-indigo-600 hover:to-pink-600 text-white font-bold px-10 py-3 rounded-xl shadow-lg shadow-indigo-500/30 transition-all">
            تسجيل الدخول <i class="fas fa-arrow-left mr-2"></i>
        </a>
    </div>
</div>
{% endblock %}
