{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[85vh] py-8">
    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-yellow-500/20 rounded-3xl shadow-2xl p-10">
        
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-yellow-500/30">
                <i class="fas fa-user-shield text-4xl text-yellow-500"></i>
            </div>
            <h2 class="text-3xl font-black text-white mb-2">Dev Access</h2>
            <p class="text-gray-400 text-sm">هذا الرابط مخصص للدخول البرمجي للنظام فقط.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if error_message %}
            <div class="bg-red-500/10 border border-red-500/40 rounded-2xl px-4 py-3 text-red-300 text-sm text-center">
                {{ error_message }}
            </div>
            {% endif %}
            
            <div class="space-y-4">
                {% for field in form %}
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-yellow-500 uppercase">الرمز السري للمطور (Master Code)</label>
                    <input type="password" name="dev_code" required class="w-full bg-black/40 border border-yellow-500/30 rounded-xl py-3 px-4 text-white focus:ring-2 focus:ring-yellow-500 outline-none transition-all font-mono">
                </div>
            </div>

            <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black py-4 rounded-xl shadow-lg transition-all hover:scale-[1.02] mt-4">
                دخول للنظام <i class="fas fa-terminal ml-2"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'register' %}" class="text-gray-500 hover:text-white text-xs transition-colors">العودة للتسجيل العادي</a>
        </div>
    </div>
</div>

<style>
    form input:not([type="hidden"]):not([name="dev_code"]) {
        width: 100%; 
        padding: 0.75rem 1rem; 
        background-color: rgba(0,0,0,0.4); 
        border: 1px solid rgba(255,255,255,0.1); 
        color: white; 
        border-radius: 0.75rem;
        transition: all 0.3s;
    }
    form input:focus { outline: none; border-color: #eab308; }
</style>
{% endblock %}
