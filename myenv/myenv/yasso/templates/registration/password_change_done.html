{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="h-full flex flex-col items-center justify-center p-4 min-h-[80vh]">
    <div class="w-full max-w-lg bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[3rem] p-12 shadow-2xl relative overflow-hidden group text-center">
        <!-- Background Accents -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-500/10 blur-[100px] rounded-full"></div>
        
        <div class="relative z-10">
            <div class="w-24 h-24 mx-auto bg-emerald-500/10 rounded-full flex items-center justify-center text-emerald-400 mb-8 border border-emerald-500/20 shadow-2xl">
                <i class="fas fa-check-double text-4xl animate-bounce"></i>
            </div>
            
            <h1 class="text-3xl font-black text-white mb-4">تم التحديث بنجاح!</h1>
            <p class="text-gray-400 font-bold mb-10 leading-relaxed px-6">
                لقد تم تغيير كلمة المرور الخاصة بك بنجاح. حسابك الآن أكثر أماناً.
            </p>

            <a href="{% url 'account_settings' %}" class="inline-flex items-center gap-3 bg-white/10 hover:bg-white/20 text-white font-black py-4 px-10 rounded-2xl border border-white/10 transition-all hover:scale-105 active:scale-95">
                <i class="fas fa-arrow-right"></i>
                العودة للإعدادات
            </a>
        </div>
    </div>
</div>
{% endblock %}
