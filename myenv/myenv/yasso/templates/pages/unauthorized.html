{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center h-[60vh] text-center px-4 animate-fade-in text-white">
    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mb-6 border border-red-500/20 shadow-lg shadow-red-500/10">
        <i class="fas fa-shield-alt text-2xl text-red-500"></i>
    </div>
    <h1 class="text-2xl font-extrabold mb-4">حدث خطأ في الإجراء</h1>
    <p class="text-gray-400 max-w-md leading-relaxed mb-8">
        {% if custom_error %}
            {{ custom_error }}
        {% else %}
            عذراً، لا تملك الصلاحيات الكافية للوصول إلى هذه الصفحة. يرجى التواصل مع مالك الشركة أو المطور إذا كنت تعتقد أن هذا خطأ.
        {% endif %}
    </p>

    <a href="{% url 'dashboard' %}" class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-0 px-8 rounded-xl transition-all shadow-xl shadow-indigo-600/20">
        <i class="fas fa-home ml-2"></i> العودة للرئيسية
    </a>
</div>
{% endblock %}
