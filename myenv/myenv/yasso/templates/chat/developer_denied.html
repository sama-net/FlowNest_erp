{% extends 'base.html' %}
{% block content %}
<div class="flex flex-col items-center justify-center h-[70vh] text-center px-4">
    <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mb-6 border border-red-500/20">
        <i class="fas fa-user-shield text-4xl text-red-500"></i>
    </div>
    <h1 class="text-3xl font-extrabold text-white mb-4">الدخول مقيد للمطور</h1>
    <p class="text-gray-400 max-w-md mx-auto leading-relaxed">
        عذراً، بصفتك مطور للنظام، لا يمكنك الدخول لمساحات عمل الشركات الخاصة. 
        صلاحياتك تقتصر على إدارة النظام العام، لوحة الموافقات، ومتابعة الأداء التقني فقط.
    </p>
    <a href="{% url 'approvals' %}" class="mt-8 px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all shadow-lg group">
        الذهاب للوحة الموافقات <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
    </a>
</div>
{% endblock %}
